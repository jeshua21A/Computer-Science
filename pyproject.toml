[tool.ruff]
# Set the maximum line length
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# Enable specific rules: E (Errors), F (Pyflakes), I (Import sorting)
select = ["E", "F", "I"]
fixable = ["ALL"]

[tool.mypy]
# Makes Mypy strict
python_version = "3.11"
strict = true
ignore_missing_imports = true